// ---- Audit ------------------------------------------------------------------

// Cursor-based pagination. "" as next_cursor signals the last page
// (proto3 strings cannot be null).
message AuditOrdersRequest {
  string cursor = 1;
  uint32 limit = 2;                    // 0 == default (50); capped at 200
  string date_from = 3;                // RFC 3339
  string date_to = 4;                  // RFC 3339
  string area = 5;
  string product = 6;
  string status = 7;
  string user_code = 8;                 // EPEX trader/user code (renamed from user_id)
  string v_member_short_id = 9;
  string voltnir_user_short_id = 10;    // submitting Voltnir user's short id (U001)
  string voltnir_username = 11;         // submitting Voltnir user's username snapshot
}

message AuditOrderItem {
  // Mirrors REST audit row one-to-one; kept as a JSON-like payload in v1 to
  // avoid proliferating proto messages for every audit column. Refactor to
  // typed fields in a future version if needed.
  string json = 1;
}

message AuditOrdersResponse {
  repeated AuditOrderItem items = 1;
  string next_cursor = 2;              // "" == last page
  uint64 total_hint = 3;               // 0 == not available on this page
}

message AuditTradesRequest {
  string cursor = 1;
  uint32 limit = 2;                    // 0 == default (50); capped at 200
  string date_from = 3;
  string date_to = 4;
  string area = 5;
  string product = 6;
  string user_code = 7;                 // EPEX trader/user code (renamed from user_id)
  string v_member_short_id = 8;
  // Which timestamp date_from/date_to filter on:
  //   "" / "delivery"  -> contract delivery window, overlap semantics (the default)
  //   "execution"      -> execution time (executed_at)
  // Any other value is rejected with INVALID_ARGUMENT.
  string time_basis = 9;
  string voltnir_user_short_id = 10;    // submitting Voltnir user's short id (U001)
  string voltnir_username = 11;         // submitting Voltnir user's username snapshot
}

message AuditTradeItem {
  string json = 1;
}

message AuditTradesResponse {
  repeated AuditTradeItem items = 1;
  string next_cursor = 2;
  uint64 total_hint = 3;
}

// Query the persisted market-wide public trade tape (M7 PblcTradeConfRprt).
// Populated only when storage.persist_public_trades is enabled on the gateway.
message AuditPublicTradesRequest {
  string cursor = 1;
  uint32 limit = 2;                    // 0 == default (50); capped at 200
  string date_from = 3;
  string date_to = 4;
  string area = 5;     // matches the buy OR sell delivery area
  string product = 6;
  string state = 7;    // trade state, e.g. "ACTI", "CNCL"
}

message AuditPublicTradeItem {
  // JSON object of one public trade. px is Eurocents (1 EUR = 100).
  string json = 1;
}

message AuditPublicTradesResponse {
  repeated AuditPublicTradeItem items = 1;
  string next_cursor = 2;
  uint64 total_hint = 3;
}

// Compliance audit-event log: the append-only who-did-what record of
// actor-driven mutations (mirrors REST GET /audit/events). Gated by read_audit.
message AuditEventsRequest {
  string cursor = 1;
  uint32 limit = 2;          // 0 == default (50); capped at 200
  string date_from = 3;
  string date_to = 4;
  string action = 5;         // event action token, e.g. "permissions_set"
  string target_type = 6;    // e.g. "user", "member", "profile"
  string actor_short_id = 7; // acting user's short id, e.g. "U001"
  string outcome = 8;        // "ok", "denied", "error"
}

message AuditEventItem {
  // JSON object of one audit event: actor, transport, source_ip, action,
  // target, before/after snapshots, outcome, reason, ts.
  string json = 1;
}

message AuditEventsResponse {
  repeated AuditEventItem items = 1;
  string next_cursor = 2;
  uint64 total_hint = 3;
}

// M7 exchange-error log: the append-only record of M7-side faults observed off
// the AMQP line (mirrors REST GET /audit/m7_errors). Gated by read_m7_errors.
message M7ErrorsRequest {
  string cursor = 1;
  uint32 limit = 2;       // 0 == default (50); capped at 200
  string date_from = 3;
  string date_to = 4;
  string kind = 5;        // fault class, e.g. "err_resp", "seq_gap"
  string category = 6;    // DFS200 §4 section, e.g. "order_entry", "limits"
  int64 err_code = 7;     // raw M7 numeric code; 0 == unset (filter omitted)
}

message M7ErrorItem {
  // JSON object of one m7_errors row: received_at, kind, category, err_code,
  // err_identifier, err_text, cl_ordr_id, client_correlation_id, var_list,
  // voltnir_*, raw_payload, severity.
  string json = 1;
}

message M7ErrorsResponse {
  repeated M7ErrorItem items = 1;
  string next_cursor = 2;
  uint64 total_hint = 3;
}

// ---------------------------------------------------------------------------
// Streaming RPCs: messages.
// ---------------------------------------------------------------------------

// Parameters for ExportOrders / ExportTrades server-streaming RPCs.
// Replaces the REST POST-then-poll flow with a single streaming call.
message ExportRequest {
  ExportFormat format = 1;             // JSON or CSV (required)
  string from = 2;                     // RFC 3339 (required)
  string to = 3;                       // RFC 3339 (required), must be after from
  string area = 4;                     // "" == all areas
  string product = 5;                  // "" == all products
}

// One chunk of the export file. Concatenate all chunks in order to obtain
// the full file. Format is what was requested.
message ExportChunk {
  bytes data = 1;
}

// Subscribe to every mutation affecting one specific contract.
message WatchContractRequest {
  string area_id = 1;
  string contract_id = 2;              // M7 numeric id as string
}

// One event in the WatchContract stream.
message ContractEvent {
  // Why this event was emitted. SNAPSHOT is always the first message after
  // subscribe and may also be re-emitted if the server falls behind and
  // recovers (broadcast Lagged path).
  enum EventType {
    SNAPSHOT = 0;
    // Order-book content changed (per-order book rows, best bid/ask, last trade).
    ORDER_BOOK_UPDATE = 1;
    // Contract metadata or lifecycle state changed (trading phase,
    // ACTI/SUSP/CLOS, ContractInfoRprt revision). Also the final event
    // before the stream closes on delete/tombstone/deactivation.
    STATE_CHANGE = 2;
    // A trade touched the contract. Fires for own executions AND
    // public-tape trades, deduplicated on (trade_id, revision_no) since
    // an own execution is usually mirrored on the public tape.
    TRADE = 3;
  }
  EventType type = 1;
  Contract contract = 2;               // full state on every event
}

// Subscribe to every mutation affecting one specific order (by coid).
message WatchOrderRequest {
  string client_order_id = 1;
}

// One event in the WatchOrder stream.
//
// For a still-pending order (submitted, not yet acked by M7) the initial
// SNAPSHOT body has state == PENDING and order_id == 0; side, price,
// quantity, contract, and area are the real submitted values. The ack
// arrives as the next event with the real order_id.
message OrderEvent {
  enum EventType {
    SNAPSHOT = 0;
    UPDATE = 1;
    // Full fill via the trade path. `order` is the final body captured
    // before removal: quantity == 0, state == INACTIVE, real price/side/ids.
    // Terminal; the stream closes after this event.
    FILLED = 2;
    // The order left the book without a trade-path fill. M7's INACTIVE
    // state does not distinguish cancel from expiry (or an OER-reported
    // fill); all of them surface here. Terminal.
    CANCELLED = 3;
    // Rejected by M7 or the local pre-check. Terminal.
    REJECTED = 4;
  }
  EventType type = 1;
  OwnOrder order = 2;
}

// Subscribe to every mutation affecting the caller's order list, optionally
// scoped by delivery area and contract.
message WatchOrdersRequest {
  string delivery_area = 1;            // "" == no filter
  string contract_id = 2;              // "" == no filter; requires delivery_area
  // Optional virtual-member short_id filter (e.g. "VM001"). When non-empty the
  // stream (snapshot + events) is narrowed to just that member; PermissionDenied
  // unless the caller is assigned to it or holds read_orders /
  // bypass_member_check. Empty = the caller's default scope.
  string v_member_short_id = 3;
}

// One event in the WatchOrders stream. Every non-SNAPSHOT event carries
// exactly one order in `orders`.
message OrdersEvent {
  enum EventType {
    SNAPSHOT = 0;                      // `orders` carries the full current list
    // First confirmed appearance of an order in the store. A
    // modify-as-delete+re-create successor is MODIFIED, not ADDED.
    ADDED = 1;
    MODIFIED = 2;
    // The order left the book without a trade-path fill (cancel, expiry,
    // or an OER-reported fill; M7 does not distinguish them).
    CANCELLED = 3;
    // Full fill via the trade path; the order body is the final state
    // captured before removal (quantity == 0, state == INACTIVE).
    FILLED = 4;
  }
  EventType type = 1;
  repeated OwnOrder orders = 2;
}

// Subscribe to the caller's filled trades. Authenticated; no permission
// required, matching the WS `trades` subscription, which delivers the full
// trade list to any authenticated session.
message WatchTradesRequest {}

// One event in the WatchTrades stream. The first message is SNAPSHOT carrying
// the full current trade list; each subsequent execution is an UPSERTED event
// carrying exactly one trade.
message TradeEvent {
  enum EventType {
    SNAPSHOT = 0;   // `trades` carries the full current list
    UPSERTED = 1;   // `trades` carries exactly one new/revised trade
  }
  EventType type = 1;
  repeated OwnTrade trades = 2;
}

// Subscribe to the market-wide public trade tape. Authenticated; no permission
// required (matches ListPublicTrades). No snapshot: each message is one live
// public trade as it arrives; clients filter by contract_id / area_id inline.
message WatchPublicTradesRequest {}

// Subscribe to the caller's derived P&L. Authenticated; member-scoped like
// GetPnl. The stream emits an immediate PnlSnapshot then a fresh one each
// second (polled; P&L is a computed view, not an event).
message WatchPnlRequest {
  // Optional virtual-member short_id filter; same semantics as GetPnl.
  string v_member_short_id = 1;
}

// Subscribe to the full runtime-health snapshot (mirrors GetState). The stream
// emits an immediate SystemState then a fresh one each second. Read gate:
// `read_state`.
message WatchStateRequest {}

// Subscribe to the trading-posture & risk-limit aggregate (mirrors GetStatus and
// the WS `status` stream). Emits an immediate SystemStatus then a fresh one each
// second. Read gate: `read_status`.
message WatchStatusRequest {}

// Subscribe to the live system / order-rejection message log. Authenticated;
// no permission required (matches the data exposed under GetState). The first
// message is the current log; subsequent messages carry newly-appended entries.
message WatchMessagesRequest {}

// One system-message row, serialised as JSON (event, order_id, contract_id,
// side, price, quantity, user_code, text, ts_ms). JSON keeps the rolling-log
// shape identical to the REST `/state` `messages` array without a parallel
// structured message + enum to maintain.
message MessageItem {
  string json = 1;
}

// Subscribe to the live compliance audit log (mirrors QueryAuditEvents).
// Gated by read_audit. No snapshot: seed history via QueryAuditEvents; the
// stream tails rows appended after subscribe. Clients filter inline.
message WatchAuditEventsRequest {}

// Subscribe to the live M7 exchange-error log (mirrors QueryM7Errors). Gated by
// read_m7_errors. Same tail semantics as WatchAuditEvents.
message WatchM7ErrorsRequest {}

// ---------------------------------------------------------------------------
// Service
// ---------------------------------------------------------------------------

// VoltAPI: the Voltnir external RPC surface.
//
// Auth is carried as gRPC metadata `authorization: Bearer <api_key>`. The
// server hashes the token (SHA-256) and looks it up against the in-memory
// user cache, identically to the REST middleware. Permission errors map to
// PERMISSION_DENIED; missing / invalid tokens map to UNAUTHENTICATED.
//
// Beyond the per-RPC permissions noted below, `bypass_member_check` lets a
// caller tag orders with any virtual member without an explicit assignment
// (checked inside SubmitOrder's member validation, not at the RPC gate).
service VoltAPI {
  // ── Orders ────────────────────────────────────────────────────────────
  // All order RPCs require their respective permission
  // (create_order, modify_order, delete_order).
  rpc SubmitOrder (SubmitOrderRequest) returns (SubmitOrderResponse);
  rpc ModifyOrder (ModifyOrderRequest) returns (ModifyOrderResponse);
  rpc CancelOrder (CancelOrderRequest) returns (CancelOrderResponse);
  rpc CancelAllOrders (CancelAllOrdersRequest) returns (CancelAllOrdersResponse);
  rpc GetOrder (GetOrderRequest) returns (GetOrderResponse);
  rpc ListOrders (ListOrdersRequest) returns (ListOrdersResponse);

  // ── Market data ───────────────────────────────────────────────────────
  // Authenticated but no specific permission (mirrors REST GET endpoints).
  rpc ListContracts (ListContractsRequest) returns (ListContractsResponse);
  rpc GetContract (GetContractRequest) returns (ContractDetail);
  rpc GetContractByDelivery (GetContractByDeliveryRequest) returns (ContractDetail);
  rpc GetHub2Hub (GetHub2HubRequest) returns (GetHub2HubResponse);

  // ── System ────────────────────────────────────────────────────────────
  // Runtime-health snapshot. Requires read_state.
  rpc GetState (GetStateRequest) returns (SystemState);
  // Trading-posture & risk-limit aggregate. Requires read_status.
  rpc GetStatus (GetStatusRequest) returns (SystemStatus);
  rpc GetThrottling (GetThrottlingRequest) returns (ThrottlingStatus);
  rpc GetSystemInfo (GetSystemInfoRequest) returns (SystemInfo);
  rpc GetContractLimit (GetContractLimitRequest) returns (ContractLimitResponse);
  // Requires set_position_limit.
  rpc SetContractLimit (SetContractLimitRequest) returns (ContractLimitResponse);
  // Global (overarching-member) cash limit. GET is authenticated only;
  // SET requires set_cash_limit. Distinct from GetCashLimits
  // (the M7-reported per-currency feed).
  rpc GetCashLimit (GetCashLimitRequest) returns (CashLimitResponse);
  rpc SetCashLimit (SetCashLimitRequest) returns (CashLimitResponse);
  // Cash-limit fail-closed switch (ECC parity). GET is authenticated only;
  // SET requires set_cash_limit (it is part of the cash-limit control).
  rpc GetCashFailClosed (GetCashFailClosedRequest) returns (CashFailClosedResponse);
  rpc SetCashFailClosed (SetCashFailClosedRequest) returns (CashFailClosedResponse);
  // Bank-holiday calendars for the cash-limit exposure window. GET is
  // authenticated only; SET/ADD/REMOVE require set_cash_limit
  // (holidays are part of the cash-limit methodology). EUR and GBP are
  // independent calendars. Every op returns the resulting HolidaysResponse.
  rpc GetHolidays (GetHolidaysRequest) returns (HolidaysResponse);
  rpc SetHolidays (SetHolidaysRequest) returns (HolidaysResponse);
  rpc AddHoliday (AddHolidayRequest) returns (HolidaysResponse);
  rpc RemoveHoliday (RemoveHolidayRequest) returns (HolidaysResponse);
  rpc GetTradingAllowed (GetTradingAllowedRequest) returns (TradingAllowedResponse);
  // Requires toggle_trading.
  rpc SetTradingAllowed (SetTradingAllowedRequest) returns (TradingAllowedResponse);
  rpc GetSelfTradePolicy (GetSelfTradePolicyRequest) returns (SelfTradePolicyResponse);
  // Requires set_self_trade_policy.
  rpc SetSelfTradePolicy (SetSelfTradePolicyRequest) returns (SelfTradePolicyResponse);
  // Requires restart_system.
  rpc Restart (RestartRequest) returns (RestartResponse);

  // ── Cash limits ────────────────────────────────────────────────────────
  // GET /api/v1/cash_limits: authenticated; no permission required.
  rpc GetCashLimits (GetCashLimitsRequest) returns (GetCashLimitsResponse);

  // ── Permission catalog ───────────────────────────────────────────────────
  // GET /api/v1/permissions: requires manage_users.
  rpc ListPermissions (ListPermissionsRequest) returns (ListPermissionsResponse);

  // ── PnL ────────────────────────────────────────────────────────────────
  // GET /api/v1/pnl: authenticated; no permission required. Full snapshot
  // (all four scopes) recomputed per call. Money in q8 units (EUR × 100_000).
  rpc GetPnl (GetPnlRequest) returns (PnlSnapshot);

  // ── Public trades ──────────────────────────────────────────────────────
  // GET /api/v1/public_trades: authenticated; no permission required.
  rpc ListPublicTrades (ListPublicTradesRequest) returns (ListPublicTradesResponse);

  // ── Users & Members ───────────────────────────────────────────────────
  // GetMe / GetMyMembers are authenticated-only. Every OTHER user/member
  // RPC, including the read-only ListUsers, GetUserMembers, and
  // ListMembers, requires manage_users or
  // manage_members respectively (same gates as REST).
  rpc GetMe (GetMeRequest) returns (UserProfile);
  rpc GetMyMembers (GetMyMembersRequest) returns (MemberListResponse);
  rpc ListUsers (ListUsersRequest) returns (ListUsersResponse);
  rpc CreateUser (CreateUserRequest) returns (CreateUserResponse);
  rpc DeleteUser (DeleteUserRequest) returns (google.protobuf.Empty);
  rpc SetPermissions (SetPermissionsRequest) returns (google.protobuf.Empty);
  rpc RotateApiKey (RotateApiKeyRequest) returns (RotateApiKeyResponse);
  rpc GetUserMembers (GetUserMembersRequest) returns (UserMembersResponse);
  rpc SetUserMembers (SetUserMembersRequest) returns (google.protobuf.Empty);
  rpc ListMembers (ListMembersRequest) returns (MemberListResponse);
  rpc CreateMember (CreateMemberRequest) returns (Member);
  rpc PatchMember (PatchMemberRequest) returns (google.protobuf.Empty);

  // ── Audit ─────────────────────────────────────────────────────────────
  // Requires read_audit.
  rpc QueryAuditOrders (AuditOrdersRequest) returns (AuditOrdersResponse);
  rpc QueryAuditTrades (AuditTradesRequest) returns (AuditTradesResponse);
  rpc QueryAuditPublicTrades (AuditPublicTradesRequest) returns (AuditPublicTradesResponse);
  rpc QueryAuditEvents (AuditEventsRequest) returns (AuditEventsResponse);

  // ── M7 errors ─────────────────────────────────────────────────────────
  // Requires read_m7_errors (dedicated, not ReadAudit).
  rpc QueryM7Errors (M7ErrorsRequest) returns (M7ErrorsResponse);

  // ── Streaming export (replaces REST poll-loop) ────────────────────────
  // Requires export_reports. Client cancellation is honored immediately.
  rpc ExportOrders (ExportRequest) returns (stream ExportChunk);
  rpc ExportTrades (ExportRequest) returns (stream ExportChunk);

  // ── Live push streams (no REST equivalent) ────────────────────────────
  // Authenticated; permission requirements match the corresponding read
  // RPCs (none for WatchContract; none for WatchOrder / WatchOrders, same
  // as REST GET /order and GET /orders).
  //
  // Protocol invariants:
  //   1. The first message after subscribe is always SNAPSHOT (for
  //      WatchOrder on a still-pending order, its body has
  //      state == PENDING and order_id == 0).
  //   2. If the server falls behind, a fresh SNAPSHOT is re-emitted
  //      before live events resume.
  //   3. WatchContract closes cleanly after a final STATE_CHANGE when the
  //      watched contract is deleted, tombstoned, or deactivated; it also
  //      closes on server shutdown and on caller cancel.
  //   4. WatchOrder closes cleanly after a terminal FILLED / CANCELLED /
  //      REJECTED event.
  rpc WatchContract (WatchContractRequest) returns (stream ContractEvent);
  rpc WatchOrder (WatchOrderRequest) returns (stream OrderEvent);
  rpc WatchOrders (WatchOrdersRequest) returns (stream OrdersEvent);

  // Live push streams added for WS⇄gRPC parity. Trades / public trades are
  // broadcast-driven (snapshot-then-events for trades; events-only for the
  // tape, re-snapshot on lag for trades). Pnl / state poll at 1 Hz (computed
  // views, not events). Messages / audit / m7_errors tail an append-only log:
  // no snapshot (seed via the unary query), rows appended after subscribe are
  // pushed; clients filter inline. Audit / m7_errors are permission-gated
  // (read_audit / read_m7_errors), identical to their unary query RPCs.
  rpc WatchTrades (WatchTradesRequest) returns (stream TradeEvent);
  rpc WatchPublicTrades (WatchPublicTradesRequest) returns (stream PublicTrade);
  rpc WatchPnl (WatchPnlRequest) returns (stream PnlSnapshot);
  // Pnl / state / status poll at 1 Hz (computed views, not events). State
  // requires read_state; status requires read_status.
  rpc WatchState (WatchStateRequest) returns (stream SystemState);
  rpc WatchStatus (WatchStatusRequest) returns (stream SystemStatus);
  rpc WatchMessages (WatchMessagesRequest) returns (stream MessageItem);
  rpc WatchAuditEvents (WatchAuditEventsRequest) returns (stream AuditEventItem);
  rpc WatchM7Errors (WatchM7ErrorsRequest) returns (stream M7ErrorItem);
}
